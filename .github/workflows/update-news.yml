name: Update vijesti - rucno i automatski

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-news.yml"
      - "update_news.py"
      - "postprocess_news.py"

permissions:
  contents: write

concurrency:
  group: update-vijesti
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azuriraj vijesti i galeriju
        run: |
          python update_news.py
          python postprocess_news.py

      - name: Spremi promjene
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/news.json data/archive.json data/category_news data/category_counts.json data/generated_at.json data/source_stats.json data/manual_gallery.json
          git commit -m "Rucno ili automatsko azuriranje vijesti i galerije" || echo "Nema promjena za commit"
          git pull --rebase || true
          git push || true
