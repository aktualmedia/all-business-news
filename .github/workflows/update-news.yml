name: Update vijesti - rucno i automatski

on:
  workflow_dispatch:
  schedule:
    # Primarni satni update: svako puno vrijeme + 7 minuta
    - cron: "7 * * * *"
    # Rezervni okidač: ako GitHub preskoči satni termin zbog opterećenja
    - cron: "37 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-news.yml"
      - "update_news.py"
      - "postprocess_news.py"

permissions:
  contents: write

env:
  TZ: Europe/Zagreb

concurrency:
  group: update-vijesti
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azuriraj vijesti i galeriju
        run: |
          echo "START UPDATE: $(date -u)"
          python update_news.py || echo "update_news.py nije prosao do kraja, nastavljam postprocess"
          python postprocess_news.py
          echo "END UPDATE: $(date -u)"

      - name: Spremi promjene
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/news.json data/archive.json data/category_news data/category_counts.json data/generated_at.json data/source_stats.json data/manual_gallery.json
          git commit -m "Automatsko azuriranje vijesti i galerije" || echo "Nema promjena za commit"
          git pull --rebase || true
          git push || true
