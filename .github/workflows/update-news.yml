name: Update vijesti - rucno i automatski

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
    - cron: "37 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-news.yml"
      - "update_news.py"
      - "fill_premium_categories.py"
      - "update_events.py"
      - "postprocess_news.py"
      - "generate_home_data.py"
      - "generate_seo.py"
      - "assets/app.js"
      - "assets/home-lite.js"
      - "assets/event-notice.js"
      - "assets/seo-meta.js"
      - "index.html"
      - "dogadjanja/**"
      - "objave/**"
      - "autor/**"
      - "nermin-sefic/**"
      - "aktual-media/**"
      - "web-vijesti/**"
      - "symbol-casopis/**"
      - "hrana/**"
      - "nakit/**"
      - "pica/**"
      - "satovi/**"
      - "hedonizam/**"
      - "data/ai_posts.json"
      - "data/person.json"
      - "data/events_sources.json"
      - "data/event_sources.json"

permissions:
  contents: write

env:
  TZ: Europe/Zagreb

concurrency:
  group: update-vijesti
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Azuriraj vijesti dogadjanja home podatke galeriju i SEO
        run: |
          echo "START UPDATE: $(date -u)"
          python update_news.py || echo "update_news.py nije prosao do kraja, nastavljam postprocess"
          python update_events.py || echo "update_events.py nije prosao do kraja, nastavljam dalje"
          python postprocess_news.py
          python fill_premium_categories.py || echo "fill_premium_categories.py nije prosao do kraja, nastavljam dalje"
          python generate_home_data.py
          python generate_seo.py
          echo "END UPDATE: $(date -u)"

      - name: Spremi promjene
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/news.json data/archive.json data/category_news data/category_counts.json data/generated_at.json data/source_stats.json data/source_quality.json data/manual_gallery.json data/events_calendar.json data/events_status.json data/manual_events.json data/home_news.json data/home_events.json data/home_symbol.json data/home_status.json data/seo_index.json sitemap.xml sitemap-news.xml sitemap-posts.xml sitemap-authors.xml sitemap-events.xml urllist.txt site.webmanifest llms.txt robots.txt
          git commit -m "Automatsko azuriranje vijesti dogadjanja home podataka galerije i SEO datoteka" || echo "Nema promjena za commit"
          git pull --rebase || true
          git push || true
