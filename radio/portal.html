<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radio portal | WEB VIJESTI</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f6f8fc;color:#0f172a;height:100vh;display:grid;grid-template-rows:auto 1fr;overflow:hidden}
    .player{background:#1f3c88;color:#fff;padding:5px 10px;box-shadow:0 4px 16px rgba(15,23,42,.16);z-index:5}
    .bar{display:flex;align-items:center;justify-content:center;gap:8px;min-height:30px;white-space:nowrap;overflow-x:auto;margin:0 auto;max-width:1180px}
    .brand{font-weight:1000;font-size:.74rem;letter-spacing:.05em;opacity:.95;text-transform:uppercase;flex:0 0 auto}
    .now{font-weight:900;font-size:.7rem;max-width:220px;overflow:hidden;text-overflow:ellipsis;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:4px 8px;flex:0 1 auto}
    .song{font-size:.68rem;max-width:340px;overflow:hidden;text-overflow:ellipsis;opacity:.92;flex:0 1 auto}
    .bar select,.bar button,.bar a{border:1px solid rgba(255,255,255,.26);background:rgba(255,255,255,.11);color:#fff;border-radius:999px;padding:4px 8px;font-weight:900;font-size:.62rem;line-height:1.1;height:23px;text-decoration:none;flex:0 0 auto}
    .bar select{min-width:170px;max-width:220px}.bar option{color:#111}.bar button{cursor:pointer}
    .frame{width:100%;height:100%;border:0;background:#fff;display:block}
    audio{display:none}
    @media(max-width:700px){.player{padding:4px 5px}.bar{min-height:25px;gap:5px;justify-content:flex-start}.brand{font-size:.58rem}.now{font-size:.56rem;max-width:92px;padding:3px 6px}.song{max-width:42vw;font-size:.55rem}.bar select{min-width:108px;max-width:128px;font-size:.53rem;height:20px;padding:2px 5px}.bar button,.bar a{font-size:.52rem;height:20px;padding:2px 5px}}
  </style>
</head>
<body>
  <section class="player">
    <div class="bar">
      <span class="brand">RADIO</span>
      <span id="now" class="now">NIJE POKRENUT</span>
      <select id="station"></select>
      <button id="play">PLAY</button>
      <button id="mute">MUTE</button>
      <button id="stop">STOP</button>
      <a id="official" target="_blank" rel="noopener">STRANICA</a>
      <span id="song" class="song">PJESMA: —</span>
    </div>
    <audio id="audio" preload="none"></audio>
  </section>
  <iframe id="content" class="frame" src="../index.html"></iframe>
<script>
(async()=>{
  const audio=document.getElementById('audio'), sel=document.getElementById('station'), now=document.getElementById('now'), song=document.getElementById('song'), official=document.getElementById('official');
  const fallback=[{title:'80s Hits Radio',stream:'https://stream.laut.fm/80er-zone',site:'https://laut.fm/80er-zone',meta:'laut.fm/80er-zone'},{title:'90s Revival Radio',stream:'https://stream.laut.fm/90er-revival',site:'https://laut.fm/90er-revival',meta:'laut.fm/90er-revival'},{title:'BBC World Service',stream:'https://stream.live.vc.bbcmedia.co.uk/bbc_world_service',site:'https://www.bbc.com/audio'}];
  let stations=fallback, metaTimer=null, currentSong='';
  try{const r=await fetch('../data/radio.json',{cache:'no-store'}); if(r.ok) stations=await r.json();}catch(e){}
  stations=stations.map(s=>{ if(!s.meta && String(s.stream||'').includes('laut.fm/')){ const m=String(s.stream).match(/laut\.fm\/([^/?#]+)/); if(m) s.meta='laut.fm/'+m[1]; } if(!s.meta && String(s.site||'').includes('laut.fm/')){ const m=String(s.site).match(/laut\.fm\/([^/?#]+)/); if(m) s.meta='laut.fm/'+m[1]; } return s; });
  sel.innerHTML=stations.map((s,i)=>`<option value="${i}">${s.title}</option>`).join('');
  function current(){ return stations[Number(sel.value)||0] || stations[0]; }
  function state(st){ localStorage.setItem('wv_radio_state',JSON.stringify({title:st.title,stream:st.stream,site:st.site,meta:st.meta||'',song:currentSong||'',playing:!audio.paused,muted:audio.muted,volume:audio.volume,at:Date.now()})); now.textContent=st.title; official.href=st.site||st.stream||'#'; }
  async function updateSong(st){
    if(metaTimer){ clearInterval(metaTimer); metaTimer=null; }
    currentSong=''; song.textContent='PJESMA: —'; state(st);
    async function poll(){
      try{
        if(st.meta && st.meta.startsWith('laut.fm/')){
          const station=st.meta.split('/')[1];
          const r=await fetch('https://api.laut.fm/station/'+encodeURIComponent(station)+'/current_song',{cache:'no-store'});
          if(r.ok){ const data=await r.json(); const artist=data.artist?.name||data.artist||''; const title=data.title||data.name||''; const txt=[artist,title].filter(Boolean).join(' - '); if(txt){ currentSong=txt; song.textContent='PJESMA: '+txt; state(st); } }
        } else {
          currentSong=''; song.textContent='PJESMA: —'; state(st);
        }
      }catch(e){}
    }
    await poll();
    metaTimer=setInterval(poll,30000);
  }
  async function play(){ const st=current(); if(audio.src!==st.stream) audio.src=st.stream; audio.play().then(()=>{state(st); updateSong(st);}).catch(()=>{now.textContent='KLIKNI PLAY: '+st.title; state(st); updateSong(st);}); }
  document.getElementById('play').onclick=play;
  document.getElementById('mute').onclick=()=>{audio.muted=!audio.muted; document.getElementById('mute').textContent=audio.muted?'SOUND':'MUTE'; state(current());};
  document.getElementById('stop').onclick=()=>{audio.pause(); audio.src=''; localStorage.removeItem('wv_radio_state'); now.textContent='NIJE POKRENUT'; currentSong=''; song.textContent='PJESMA: —'; if(metaTimer) clearInterval(metaTimer);};
  sel.addEventListener('change',()=>{ const st=current(); official.href=st.site||st.stream||'#'; if(!audio.paused) play(); else {now.textContent=st.title; updateSong(st);} });
  audio.addEventListener('play',()=>{state(current()); updateSong(current());});
  audio.addEventListener('volumechange',()=>state(current()));
  const qs=new URLSearchParams(location.search); const s=qs.get('station'); if(s){ const idx=stations.findIndex(x=>String(x.title).toLowerCase().includes(s.toLowerCase())); if(idx>=0) sel.value=idx; play(); } else { official.href=current().site||current().stream||'#'; }
})();
</script>
</body>
</html>
